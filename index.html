<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const C = { ink:"#1F4A4D", ink2:"#2F5D62", clay:"#C77B4A", clayDk:"#A65F33", sage:"#6E8E80",
  bg:"#F7F3EC", card:"#FFFFFF", line:"#E4DCCD", flag:"#FBE9DD", flagTxt:"#9A4B22", good:"#2E7D52", mut:"#7C766B" };

// ---- storage: localStorage on a hosted page, memory fallback in previews ----
const mem = {};
let storageWarning = null; // set by store.set on quota failure; App polls this to show a banner
const store = {
  get(k){
    // Prefer the in-session cache: if a previous write to this key failed to
    // reach disk (e.g. storage full), mem still holds the true latest value.
    if (k in mem) return mem[k];
    try { return localStorage.getItem(k); } catch(e){ return null; }
  },
  set(k,v){
    mem[k]=v; // always succeeds — this is what reads check first
    try { localStorage.setItem(k,v); storageWarning=null; return true; }
    catch(e){ storageWarning="full"; return false; }
  },
};
const parse = (s,d)=>{ try { return s ? JSON.parse(s) : d; } catch { return d; } };
// Read-fresh-before-write: always merges against what's ACTUALLY on disk right now,
// not just what's in React memory. Prevents a backgrounded/duplicate tab from
// silently overwriting an entry saved elsewhere in the meantime.
const safeSave = (key, updater, setter) => {
  const fresh = parse(store.get(key), []);
  const next = typeof updater === "function" ? updater(fresh) : updater;
  store.set(key, JSON.stringify(next));
  setter(next);
  return next;
};

// ---- icons ----
const Svg = ({children,size=24,sw=1.9,...rest}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" {...rest}>{children}</svg>
);
const Icon = {
  Home:(p)=><Svg {...p}><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></Svg>,
  Dumbbell:(p)=><Svg {...p}><path d="M6.5 6.5v11M3.5 9v6M17.5 6.5v11M20.5 9v6M6.5 12h11"/></Svg>,
  Ruler:(p)=><Svg {...p}><path d="M4 16L16 4l4 4L8 20z"/><path d="M9 9l1.4 1.4M12 6l1.4 1.4M6 12l1.4 1.4"/></Svg>,
  Plan:(p)=><Svg {...p}><rect x="6" y="4" width="12" height="17" rx="2"/><path d="M9.5 4V3h5v1"/><path d="M9 10h6M9 14h6M9 18h4"/></Svg>,
  Progress:(p)=><Svg {...p}><path d="M3 17l5-6 4 3 6-8"/><path d="M14 6h4v4"/></Svg>,
  Plus:(p)=><Svg {...p}><path d="M12 5v14M5 12h14"/></Svg>,
  Check:(p)=><Svg {...p}><path d="M5 12l5 5L19 7"/></Svg>,
  Trash:(p)=><Svg {...p}><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></Svg>,
  Camera:(p)=><Svg {...p}><path d="M3 8h4l2-2h6l2 2h4v12H3z"/><circle cx="12" cy="13" r="3.4"/></Svg>,
  Chevron:(p)=><Svg {...p}><path d="M9 6l6 6-6 6"/></Svg>,
  Pencil:(p)=><Svg {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></Svg>,
};

const EXERCISES = ["Hip thrust","KAS glute bridge","Cable kickbacks","Banded clamshells","Banded lateral walks","Romanian deadlift","Nordic hamstring curls","Step-ups","Bulgarian split squat","Goblet squat","Dead bugs","Bird dogs","McGill curl-up","Modified side plank","Pallof press","Wall push-ups","Band rows","Band curls","Banded lateral raises","Tricep pushdowns","Overhead tricep extension","Band face pulls","Walk"];
const PROTEIN_GOAL = 130;
const PROTEIN_PRESETS = [["Protein shake",30],["Core Power Elite",42],["Greek yogurt",18],["Chicken",25],["Tuna pouch",18],["Turkey wrap",20],["Cottage cheese",18],["Egg",6],["String cheese",7],["Protein bar",20]];

const todayStr = () => new Date().toISOString().slice(0,10);
const uid = () => Math.random().toString(36).slice(2,9);
const getWeekKey = (d=new Date()) => { const dt=new Date(d); const day=dt.getDay(); dt.setDate(dt.getDate()-day); return dt.toISOString().slice(0,10); };
const fmtDate = (s)=>{ try { return new Date(s+"T00:00:00").toLocaleDateString(undefined,{month:"short",day:"numeric"}); } catch { return s; } };
const workoutDetail = (w)=> w.exercise==="Walk"
  ? ([w.steps?`${w.steps} steps`:null, w.duration?`${w.duration} min`:null, w.calories?`${w.calories} cal`:null].filter(Boolean).join(" · ")||"Walk")
  : `${w.sets?`${w.sets} × ${w.reps}`:w.reps}${w.resistance?` · ${w.resistance}`:""}${w.felt?` · felt ${w.felt}/5`:""}`;

const inputStyle = { width:"100%", padding:"11px 12px", borderRadius:12, border:`1px solid ${C.line}`, background:"#FCFAF5", fontSize:16, color:C.ink, boxSizing:"border-box" };

const Header = ({kicker,title}) => (
  <div style={{padding:"calc(env(safe-area-inset-top) + 26px) 20px 10px"}}>
    {kicker && <div style={{fontSize:12,letterSpacing:1.5,textTransform:"uppercase",color:C.clay,fontWeight:700}}>{kicker}</div>}
    <div style={{fontFamily:"Georgia, 'Times New Roman', serif",fontSize:28,lineHeight:1.1,marginTop:4,color:C.ink}}>{title}</div>
  </div>
);
const Card = ({children,style}) => (
  <div style={{background:C.card,border:`1px solid ${C.line}`,borderRadius:18,padding:16,...style}}>{children}</div>
);
const Field = ({label,children}) => (
  <label style={{display:"block",marginBottom:12}}>
    <span style={{fontSize:12,color:C.mut,fontWeight:600}}>{label}</span>
    <div style={{marginTop:4}}>{children}</div>
  </label>
);
const Btn = ({children,onClick,kind="primary",style}) => {
  const k = { primary:{background:C.clay,color:"#fff",border:"none"}, ghost:{background:"transparent",color:C.ink,border:`1px solid ${C.line}`} };
  return <button onClick={onClick} style={{padding:"13px 16px",borderRadius:12,fontSize:15,fontWeight:700,width:"100%",...k[kind],...style}}>{children}</button>;
};

function App(){
  const [tab,setTab] = useState("home");
  const [workouts,setWorkouts] = useState(()=>parse(store.get("jess_workouts"),[]));
  const [measures,setMeasures] = useState(()=>parse(store.get("jess_measures"),[]));
  const [photos,setPhotos] = useState(()=>parse(store.get("jess_photos"),[]));
  const [checkins,setCheckins] = useState(()=>parse(store.get("jess_checkins"),[]));
  const [protein,setProtein] = useState(()=>parse(store.get("jess_protein"),[]));
  const [restDays,setRestDays] = useState(()=>parse(store.get("jess_restdays"),[]));
  const [showExport,setShowExport] = useState(false);

  // Re-sync from disk whenever the app becomes visible again (e.g. returning from
  // the camera, switching back from another tab). Keeps the on-screen state from
  // ever silently disagreeing with what's actually saved.
  React.useEffect(()=>{
    const resync=()=>{
      if(document.visibilityState!=="visible")return;
      setWorkouts(parse(store.get("jess_workouts"),[]));
      setMeasures(parse(store.get("jess_measures"),[]));
      setPhotos(parse(store.get("jess_photos"),[]));
      setCheckins(parse(store.get("jess_checkins"),[]));
      setProtein(parse(store.get("jess_protein"),[]));
      setRestDays(parse(store.get("jess_restdays"),[]));
    };
    document.addEventListener("visibilitychange",resync);
    window.addEventListener("pageshow",resync);
    return ()=>{ document.removeEventListener("visibilitychange",resync); window.removeEventListener("pageshow",resync); };
  },[]);

  const [storageFull,setStorageFull]=useState(false);
  const wrap=(key,setter)=>(updater)=>{ const r=safeSave(key,updater,setter); setStorageFull(storageWarning==="full"); return r; };
  const saveWorkouts=wrap("jess_workouts",setWorkouts);
  const saveMeasures=wrap("jess_measures",setMeasures);
  const savePhotos=wrap("jess_photos",setPhotos);
  const saveCheckins=wrap("jess_checkins",setCheckins);
  const saveProtein=wrap("jess_protein",setProtein);
  const saveRestDays=wrap("jess_restdays",setRestDays);

  const tabs=[["home","Home",Icon.Home],["workout","Workout",Icon.Dumbbell],["body","Body",Icon.Ruler],["progress","Progress",Icon.Progress]];

  return (
    <div style={{background:C.bg,color:C.ink,minHeight:"100vh"}}>
      <div style={{maxWidth:480,margin:"0 auto",paddingBottom:"calc(env(safe-area-inset-bottom) + 92px)"}}>
        {storageFull && (
          <div style={{padding:"14px 16px 0"}}>
            <div style={{background:"#FBE9DD",border:`1px solid #E0996B`,borderRadius:14,padding:"12px 14px"}}>
              <div style={{fontSize:13,fontWeight:800,color:"#9A4B22",marginBottom:4}}>⚠ Phone storage is full</div>
              <div style={{fontSize:12.5,color:"#9A4B22",lineHeight:1.5}}>Your latest entry isn't saving. Delete a few older progress photos on the Body tab to free up space, or back up to your Sheet and clear old data.</div>
              <button onClick={()=>setStorageFull(false)} style={{marginTop:8,background:"none",border:"none",padding:0,fontSize:12,fontWeight:700,color:"#9A4B22",textDecoration:"underline"}}>Dismiss</button>
            </div>
          </div>
        )}
        {tab==="home" && <HomeTab {...{workouts,measures,checkins,saveCheckins,protein,saveProtein,setTab}} />}
        {tab==="workout" && <WorkoutTab {...{workouts,saveWorkouts}} />}
        {tab==="body" && <BodyTab {...{measures,saveMeasures,photos,savePhotos}} />}
        {tab==="progress" && <ProgressTab {...{workouts,measures,protein,restDays,saveRestDays,checkins,saveCheckins,setShowExport}} />}
        {showExport && <ExportModal {...{workouts,measures,photos,protein,checkins,onClose:()=>setShowExport(false)}} />}
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,borderTop:`1px solid ${C.line}`,background:"rgba(255,255,255,0.94)",backdropFilter:"blur(8px)",paddingBottom:"env(safe-area-inset-bottom)"}}>
        <div style={{maxWidth:480,margin:"0 auto",display:"flex"}}>
          {tabs.map(([id,label,I])=>{
            const on=tab===id;
            return <button key={id} onClick={()=>setTab(id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"none",border:"none",padding:"10px 0 14px",color:on?C.clay:C.mut}}>
              <I size={22} sw={on?2.4:1.8} />
              <span style={{fontSize:11,marginTop:3,fontWeight:on?700:500}}>{label}</span>
            </button>;
          })}
        </div>
      </div>
    </div>
  );
}

function HomeTab({workouts,measures,checkins,saveCheckins,protein,saveProtein,setTab}){
  const sorted=[...measures].sort((a,b)=>a.date.localeCompare(b.date));
  const baseline=sorted[0], latest=sorted[sorted.length-1];
  const wChange=(baseline&&latest&&baseline.weight!=null&&latest.weight!=null)?(latest.weight-baseline.weight):null;
  // Entry-over-entry trend (neutral — just shows direction, no "good/bad" framing)
  const weighIns=sorted.filter(m=>m.weight!=null);
  const trend=weighIns.length>=2?(weighIns[weighIns.length-1].weight-weighIns[weighIns.length-2].weight):null;
  const weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-7);
  const sessions=new Set(workouts.filter(w=>w.exercise!=="Walk"&&new Date(w.date+"T00:00:00")>=weekAgo).map(w=>w.date)).size;
  const [energy,setEnergy]=useState(0);const [win,setWin]=useState("");const [saved,setSaved]=useState(false);
  const [editCheckinId,setEditCheckinId]=useState(null);
  const logCheckin=()=>{
    if(editCheckinId){ saveCheckins(curr=>curr.map(c=>c.id===editCheckinId?{...c,sessions,energy,win}:c)); setEditCheckinId(null); }
    else saveCheckins(curr=>[{id:uid(),weekStart:todayStr(),sessions,energy,win},...curr]);
    setEnergy(0);setWin("");setSaved(true);setTimeout(()=>setSaved(false),2200);
  };
  const hour=new Date().getHours();
  const greet=hour<12?"Good morning":hour<18?"Good afternoon":"Good evening";
  const todayProtein=protein.filter(p=>p.date===todayStr()).reduce((s,p)=>s+(Number(p.grams)||0),0);
  const showProteinNudge=hour>=13&&todayProtein===0;

  // Celebrate hitting 3/3 sessions — once per week, persisted so it doesn't
  // re-fire every time you switch back to this tab.
  const [celebrateSessions,setCelebrateSessions]=useState(false);
  useEffect(()=>{
    if(sessions>=3){
      const flagKey=`jess_celebrated_sessions_${getWeekKey()}`;
      if(!store.get(flagKey)){
        store.set(flagKey,"1");
        setCelebrateSessions(true);
        const id=setTimeout(()=>setCelebrateSessions(false),2800);
        return ()=>clearTimeout(id);
      }
    }
  },[sessions]);

  return (
    <div>
      <Header kicker={greet} title="Today's the day you show up." />
      {celebrateSessions && (
        <div style={{padding:"0 16px 0"}}>
          <div style={{background:C.good,color:"#fff",borderRadius:14,padding:"10px 16px",fontSize:13.5,fontWeight:700,textAlign:"center",boxShadow:"0 6px 18px rgba(46,125,82,0.35)",animation:"slideDown .3s ease-out"}}>
            🎉 3/3 sessions this week — amazing!
          </div>
        </div>
      )}
      <div style={{padding:"8px 16px 0"}}>
        <Card style={{background:C.ink,border:"none",color:"#fff"}}>
          <div style={{display:"flex",gap:16}}>
            <div style={{flex:1}}>
              <div style={{fontSize:12,color:"#BFD6CF",fontWeight:600}}>Current weight</div>
              <div style={{fontFamily:"Georgia,serif",fontSize:38,lineHeight:1}}>{latest&&latest.weight!=null?latest.weight:"—"}<span style={{fontSize:15,color:"#BFD6CF"}}> lb</span></div>
              {wChange!=null && <div style={{fontSize:13,marginTop:4,color:"#BFD6CF"}}>{wChange===0?"Holding steady":`${wChange>0?"+":""}${wChange.toFixed(1)} lb from baseline`}</div>}
              {trend!=null && trend!==0 && (
                <div style={{fontSize:12,marginTop:2,color:"#9FC2BB"}}>{trend>0?"↑":"↓"} {Math.abs(trend).toFixed(1)} lb vs last check-in</div>
              )}
            </div>
            <div style={{width:1,background:"rgba(255,255,255,0.18)"}} />
            <div style={{flex:1}}>
              <div style={{fontSize:12,color:"#BFD6CF",fontWeight:600}}>This week</div>
              <div style={{fontFamily:"Georgia,serif",fontSize:38,lineHeight:1}}>{sessions}<span style={{fontSize:15,color:"#BFD6CF"}}> / 3</span></div>
              <div style={{fontSize:13,marginTop:4,color:"#BFD6CF"}}>{sessions>=3?"Goal hit 🎉":sessions===0?"Let's get one in":"Keep going"}</div>
            </div>
          </div>
        </Card>
      </div>

      {showProteinNudge && (
        <div style={{padding:"10px 16px 0"}}>
          <Card style={{background:C.flag,border:"none",padding:"12px 14px"}}>
            <div style={{fontSize:13,color:C.flagTxt,fontWeight:600}}>🍽️ No protein logged yet today — grab one of your usuals below.</div>
          </Card>
        </div>
      )}

      <ProteinCard protein={protein} saveProtein={saveProtein} />

      <div style={{padding:"14px 16px 0"}}>
        <Btn onClick={()=>setTab("workout")}><span style={{display:"inline-flex",alignItems:"center"}}><Icon.Plus size={18} /><span style={{marginLeft:6}}>Log today's workout</span></span></Btn>
      </div>

      <div style={{padding:"18px 16px 0"}}>
        <div style={{fontSize:13,fontWeight:700,color:C.mut,marginBottom:8}}>RECENT</div>
        {workouts.length===0 ? (
          <Card><div style={{color:C.mut,fontSize:14}}>No workouts logged yet. Your first one is the starting gun.</div></Card>
        ) : (
          <Card style={{padding:0}}>
            {workouts.slice(0,5).map((w,i)=>(
              <div key={w.id} style={{display:"flex",alignItems:"center",padding:"12px 16px",borderTop:i?`1px solid ${C.line}`:"none"}}>
                <div style={{flex:1}}><div style={{fontSize:15,fontWeight:600}}>{w.exercise}</div><div style={{fontSize:12,color:C.mut}}>{workoutDetail(w)}</div></div>

function ProteinCard({protein,saveProtein}){
  const t=todayStr();
  const today=protein.filter(p=>p.date===t);
  const total=today.reduce((s,p)=>s+(Number(p.grams)||0),0);
  const pct=Math.min(100,Math.round((total/PROTEIN_GOAL)*100));
  const [custom,setCustom]=useState("");const [customLbl,setCustomLbl]=useState("");
  const [showHistory,setShowHistory]=useState(false);
  const [editId,setEditId]=useState(null);const [editVal,setEditVal]=useState("");
  const add=(label,grams)=>{ if(!grams)return; saveProtein(curr=>[{id:uid(),date:t,grams:Number(grams),label},...curr]); };
  const addCustom=()=>{const g=parseFloat(custom); if(!g)return; add(customLbl||"Custom",g); setCustom("");setCustomLbl("");};
  const remove=(id)=>saveProtein(curr=>curr.filter(p=>p.id!==id));
  const startEdit=(p)=>{setEditId(p.id);setEditVal(String(p.grams));};
  const confirmEdit=()=>{const g=parseFloat(editVal); if(g)saveProtein(curr=>curr.map(p=>p.id===editId?{...p,grams:g}:p)); setEditId(null);};
  const hit=total>=PROTEIN_GOAL;
  const [celebrate,setCelebrate]=useState(false);
  const prevHit=useRef(false);
  useEffect(()=>{
    if(hit&&!prevHit.current){ setCelebrate(true); const id=setTimeout(()=>setCelebrate(false),2600); prevHit.current=true; return ()=>clearTimeout(id); }
    if(!hit) prevHit.current=false;
  },[hit]);

  // "Your usual" — items you've typed in 3+ times become one-tap buttons automatically.
  // Uses the most recently logged amount for that item.
  const frequent=(()=>{
    const presetLabels=new Set(PROTEIN_PRESETS.map(([l])=>l.toLowerCase()));
    const stats={};
    protein.forEach(p=>{
      const key=(p.label||"").trim();
      if(!key||key.toLowerCase()==="custom"||presetLabels.has(key.toLowerCase()))return;
      if(!stats[key])stats[key]={count:0,grams:p.grams,date:p.date};
      stats[key].count++;
      if(p.date>=stats[key].date){stats[key].grams=p.grams;stats[key].date=p.date;}
    });
    return Object.entries(stats).filter(([,v])=>v.count>=3).sort((a,b)=>b[1].count-a[1].count).slice(0,6);
  })();

  // Last 7 days of totals, for the "is this actually saving?" reassurance view.
  const history=(()=>{
    const days={};
    protein.forEach(p=>{days[p.date]=(days[p.date]||0)+(Number(p.grams)||0);});
    return Object.entries(days).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7);
  })();

        <div style={{display:"flex",alignItems:"flex-end",marginBottom:10}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,color:C.mut}}>PROTEIN TODAY</div>
            <div style={{fontFamily:"Georgia,serif",fontSize:34,lineHeight:1,marginTop:2,color:hit?C.good:C.ink}}>{total}<span style={{fontSize:15,color:C.mut}}> / {PROTEIN_GOAL}g</span></div>
          </div>
          {hit && <div style={{fontSize:13,color:C.good,fontWeight:700}}>Goal hit 💪</div>}

            <div style={{display:"flex",flexWrap:"wrap",gap:7}}>

// Compress a File to a small JPEG data URL suitable for localStorage
const compressImg=(file)=>new Promise(res=>{
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=340;
      const s=Math.min(MAX/img.width,MAX/img.height,1);
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*s); c.height=Math.round(img.height*s);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',0.6));
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
});

// Tiny inline sparkline — no chart library needed
function Sparkline({data,width=300,height=56,color}){
  if(data.length<2)return null;
  const min=Math.min(...data),max=Math.max(...data);
  const range=(max-min)||1;
  const pts=data.map((v,i)=>{
    const x=(i/(data.length-1))*width;
    const y=height-4-((v-min)/range)*(height-8);
    return `${x},${y}`;
  }).join(" ");
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
      <polyline points={pts} fill="none" stroke={color||C.clay} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
      {data.map((v,i)=>{
        const x=(i/(data.length-1))*width;
        const y=height-4-((v-min)/range)*(height-8);
        return i===data.length-1 ? <circle key={i} cx={x} cy={y} r="3.5" fill={color||C.clay} /> : null;
      })}
    </svg>
  );
}

function ExportModal({workouts,measures,photos,protein,checkins,onClose}){
  const [which,setWhich]=useState("workouts");const [copied,setCopied]=useState(false);
  const yn=(b)=>b?"Yes":"";const v=(x)=>x==null?"":x;
  const builders={
    workouts:()=>{const r=[["Date","Exercise","Sets","Reps","Resistance","Felt(1-5)","Steps","Duration(min)","Calories"]];[...workouts].sort((a,b)=>a.date.localeCompare(b.date)).forEach(w=>r.push([w.date,w.exercise,v(w.sets),v(w.reps),v(w.resistance),v(w.felt),v(w.steps),v(w.duration),v(w.calories)]));return r;},
    measurements:()=>{const r=[["Date","Weight","Bust","Under-bust","Waist","Lower belly","Hips/glutes","L Thigh","R Thigh","L Arm","R Arm"]];[...measures].sort((a,b)=>a.date.localeCompare(b.date)).forEach(m=>r.push([m.date,v(m.weight),v(m.bust),v(m.underbust),v(m.waist),v(m.lowerBelly),v(m.hips),v(m.lThigh),v(m.rThigh),v(m.lArm),v(m.rArm)]));return r;},
    protein:()=>{const r=[["Date","Grams","Item"]];[...protein].sort((a,b)=>a.date.localeCompare(b.date)).forEach(p=>r.push([p.date,v(p.grams),v(p.label)]));return r;},
    photos:()=>{const r=[["Date","Front","Side","Back"]];[...photos].sort((a,b)=>a.date.localeCompare(b.date)).forEach(p=>r.push([p.date,yn(p.front),yn(p.side),yn(p.back)]));return r;},
    checkins:()=>{const r=[["Week","Sessions","Energy","Win"]];[...checkins].sort((a,b)=>a.weekStart.localeCompare(b.weekStart)).forEach(c=>r.push([c.weekStart,v(c.sessions),v(c.energy),v(c.win)]));return r;},
  };
  const tsv=builders[which]().map(r=>r.join("\t")).join("\n");
  const copy=async()=>{ try { await navigator.clipboard.writeText(tsv); setCopied(true); store.set("jess_last_backup",todayStr()); setTimeout(()=>setCopied(false),2000); } catch { setCopied(false); } };
  const tabs=[["workouts","Workouts"],["measurements","Body"],["protein","Protein"],["photos","Photos"],["checkins","Check-ins"]];
  return (
    <div style={{position:"fixed",inset:0,display:"flex",alignItems:"flex-end",background:"rgba(31,74,77,0.45)",zIndex:50}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.bg,width:"100%",maxWidth:480,margin:"0 auto",borderTopLeftRadius:22,borderTopRightRadius:22,padding:18,maxHeight:"88vh",overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:6}}><div style={{flex:1,fontFamily:"Georgia,serif",fontSize:22}}>Back up to your Sheet</div><button onClick={onClose} style={{color:C.mut,background:"none",border:"none",fontSize:15,fontWeight:700}}>Done</button></div>
        <div style={{fontSize:12.5,color:C.mut,lineHeight:1.5,marginBottom:12}}>Pick a section, tap Copy, then in Google Sheets tap a cell on the matching tab and paste. It fills across columns automatically.</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:12}}>{tabs.map(([id,lbl])=>(<button key={id} onClick={()=>setWhich(id)} style={{padding:"7px 13px",borderRadius:99,border:`1px solid ${which===id?C.clay:C.line}`,background:which===id?C.clay:"#FCFAF5",color:which===id?"#fff":C.ink,fontWeight:700,fontSize:13}}>{lbl}</button>))}</div>
        <Btn onClick={copy} kind={copied?"ghost":"primary"} style={{marginBottom:10}}>{copied?<span style={{color:C.good}}>Copied — now paste into Sheets ✓</span>:"Copy this section"}</Btn>
        <textarea readOnly value={tsv} onFocus={e=>e.target.select()} style={{width:"100%",height:180,padding:12,borderRadius:12,border:`1px solid ${C.line}`,background:"#FCFAF5",fontSize:12,fontFamily:"monospace",color:C.ink,boxSizing:"border-box"}} />
        <div style={{fontSize:11.5,color:C.mut,marginTop:8}}>If Copy doesn't work, long-press inside the box → Select All → Copy.</div>
      </div>
    </div>
  );
}

function ProgressTab({workouts,measures,protein,restDays,saveRestDays,checkins,saveCheckins,setShowExport}){
  const sorted=[...measures].sort((a,b)=>a.date.localeCompare(b.date));
  const baseline=sorted[0],latest=sorted[sorted.length-1];
  const delta=(k)=>{ if(!baseline||!latest||baseline[k]==null||latest[k]==null)return null; return latest[k]-baseline[k]; };

  // Consistency streak: consecutive days, ending today/yesterday, where you either
  // logged a workout, hit your protein goal, or marked the day a rest day.
  const t=todayStr();
  const isRestDay=restDays.includes(t);
  const toggleRestDay=()=>saveRestDays(curr=>curr.includes(t)?curr.filter(d=>d!==t):[...curr,t]);
  const dayWorkoutSet=new Set(workouts.filter(w=>w.exercise!=="Walk").map(w=>w.date));
  const proteinByDay={};
  protein.forEach(p=>{proteinByDay[p.date]=(proteinByDay[p.date]||0)+(Number(p.grams)||0);});
  const daySatisfied=(d)=>dayWorkoutSet.has(d)||(proteinByDay[d]||0)>=PROTEIN_GOAL||restDays.includes(d);
  const streak=(()=>{
    let n=0; let d=new Date();
    if(!daySatisfied(todayStr())) d.setDate(d.getDate()-1);
    while(true){
      const ds=d.toISOString().slice(0,10);
      if(!daySatisfied(ds))break;
      n++; d.setDate(d.getDate()-1);
      if(n>365)break;
    }
    return n;
  })();

  // Personal Bests — auto-filled from the Workout Log, most recent set per exercise.
  const bestByExercise=(()=>{
    const map={};
    [...workouts].filter(w=>w.exercise!=="Walk").sort((a,b)=>a.date.localeCompare(b.date)).forEach(w=>{ map[w.exercise]=w; });
    return map;
  })();
  const exerciseOrder=ROUTINE.filter(r=>!r[0].startsWith("──")).map(r=>r[0].split(" → ")[0]);
  const bestRows=Object.keys(bestByExercise).length>0
    ? [...new Set([...exerciseOrder,...Object.keys(bestByExercise)])].filter(ex=>bestByExercise[ex])
    : [];

  const removeCheckin=(id)=>saveCheckins(curr=>curr.filter(c=>c.id!==id));

  // Backup reminder — soft nudge if it's been 30+ days, or never backed up
  const lastBackup=store.get("jess_last_backup");
  const daysSince=lastBackup?Math.floor((Date.now()-new Date(lastBackup+"T00:00:00").getTime())/86400000):null;
  const showBackupNudge=daysSince==null?workouts.length>=6:daysSince>=30;

  const weighIns=sorted.filter(m=>m.weight!=null).slice(-8);

  return (
    <div>
      <Header kicker="How it's going" title="Progress" />

      <div style={{padding:"4px 16px 0"}}>
        <Card style={{padding:"12px 14px",display:"flex",alignItems:"center"}}>
          <div style={{flex:1,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:20}}>🔥</span>
            <div>
              <div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.1}}>{streak} day{streak===1?"":"s"}</div>
              <div style={{fontSize:11,color:C.mut}}>workout, protein goal, or rest day logged</div>
            </div>
          </div>
          <button onClick={toggleRestDay} style={{padding:"7px 12px",borderRadius:99,border:`1px solid ${isRestDay?C.clay:C.line}`,background:isRestDay?C.clay:"#FCFAF5",color:isRestDay?"#fff":C.ink,fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>
            {isRestDay?"✓ Resting today":"Mark rest day"}
          </button>
        </Card>
      </div>

      {weighIns.length>=2 && (
        <div style={{padding:"12px 16px 0"}}>
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
              <div style={{fontSize:13,fontWeight:700,color:C.mut}}>WEIGHT TREND</div>
              <div style={{fontSize:11,color:C.mut}}>last {weighIns.length} weigh-ins</div>
            </div>
            <Sparkline data={weighIns.map(m=>m.weight)} />
            <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
              <div style={{fontSize:11,color:C.mut}}>{fmtDate(weighIns[0].date)} · {Math.min(...weighIns.map(m=>m.weight))}–{Math.max(...weighIns.map(m=>m.weight))} lb</div>
              <div style={{fontSize:11,color:C.mut}}>{fmtDate(weighIns[weighIns.length-1].date)}</div>
            </div>
          </Card>
        </div>
      )}

      {sorted.length>=2 && (
        <div style={{padding:"12px 16px 0"}}>
          <Card>
            <div style={{fontSize:13,fontWeight:700,color:C.mut,marginBottom:10}}>SINCE BASELINE ({fmtDate(baseline.date)})</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
              {MEAS_FIELDS.map(([k,lbl])=>{const d=delta(k);if(d==null)return null;const down=d<0;return (<div key={k} style={{width:"calc(50% - 5px)",background:"#FCFAF5",border:`1px solid ${C.line}`,borderRadius:12,padding:"8px 10px"}}><div style={{fontSize:11,color:C.mut}}>{lbl}</div><div style={{fontSize:16,fontWeight:700,color:down?C.good:C.ink}}>{d>0?"+":""}{d.toFixed(1)}</div></div>);})}
            </div>
            <div style={{fontSize:11,color:C.mut,marginTop:10}}>Inches can stall as muscle replaces fat — that's progress too. Trust the photos.</div>
          </Card>
        </div>
      )}

      {bestRows.length>0 && (
        <div style={{padding:"18px 16px 0"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.mut,marginBottom:8}}>YOUR CURRENT NUMBERS</div>
          <Card style={{padding:0}}>
            {bestRows.map((ex,i)=>{
              const w=bestByExercise[ex];
              return (
                <div key={ex} style={{padding:"11px 14px",borderTop:i?`1px solid ${C.line}`:"none"}}>
                  <div style={{display:"flex",alignItems:"center"}}>
                    <div style={{flex:1,fontSize:14,fontWeight:600}}>{ex}</div>
                    <div style={{fontSize:12,color:C.mut}}>{fmtDate(w.date)}</div>
                  </div>
                  <div style={{fontSize:12.5,color:C.clay,fontWeight:600,marginTop:1}}>{workoutDetail(w)}</div>
                </div>
              );
            })}
          </Card>
          <div style={{fontSize:11,color:C.mut,padding:"8px 4px 0"}}>Auto-filled from your most recent logged set per exercise.</div>
        </div>
      )}

      <div style={{padding:"18px 16px 0"}}>
        <div style={{fontSize:13,fontWeight:700,color:C.mut,marginBottom:8}}>CHECK-IN HISTORY</div>
        {checkins.length===0 ? (
          <Card><div style={{color:C.mut,fontSize:14}}>No check-ins yet — log one from the Home tab.</div></Card>
        ) : (
          <Card style={{padding:0}}>
            {checkins.slice(0,12).map((c,i)=>(
              <div key={c.id} style={{display:"flex",alignItems:"center",padding:"12px 14px",borderTop:i?`1px solid ${C.line}`:"none"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:600}}>{fmtDate(c.weekStart)} · {c.sessions}/3 sessions{c.energy?` · energy ${c.energy}/5`:""}</div>
                  {c.win && <div style={{fontSize:12,color:C.mut,marginTop:1}}>{c.win}</div>}
                </div>
                <button onClick={()=>removeCheckin(c.id)} style={{color:C.mut,background:"none",border:"none",padding:4}}><Icon.Trash size={15} /></button>
              </div>
            ))}
          </Card>
        )}
      </div>

      <div style={{padding:"18px 16px 28px"}}>
        <div style={{fontSize:13,fontWeight:700,color:C.mut,marginBottom:8}}>BACKUP</div>
        {showBackupNudge && (
          <Card style={{background:C.flag,border:"none",marginBottom:10,padding:"12px 14px"}}>
            <div style={{fontSize:13,color:C.flagTxt,fontWeight:600}}>
              {daysSince==null?"You haven't backed up to your Sheet yet — worth doing once you've got some entries in.":`It's been ${daysSince} days since your last backup — quick top-up?`}
            </div>
          </Card>
        )}
        <Card>
          <div style={{fontSize:13.5,lineHeight:1.5,marginBottom:12}}>Export your logs to paste into your Google Sheet — a 20-second monthly habit that keeps a permanent copy.</div>
          <Btn onClick={()=>setShowExport(true)}>Back up to Google Sheet</Btn>
          {daysSince!=null && <div style={{fontSize:11,color:C.mut,marginTop:8}}>Last backed up {daysSince===0?"today":daysSince===1?"yesterday":`${daysSince} days ago`}.</div>}
        </Card>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
